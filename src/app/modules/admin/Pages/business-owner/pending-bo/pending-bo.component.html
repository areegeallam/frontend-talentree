<div class="table-container">
  <div class="mt-5 mb-5 p-5">
    <div class="row justify-content-center">
      <div class="col-4">
        <div
          class="card bg-pink text-white stat-card-filter"
          [class.stat-card-filter--active]="approvalFilter === 'all'"
          role="button"
          tabindex="0"
          [attr.aria-pressed]="approvalFilter === 'all'"
          aria-label="Show all pending owners"
          (click)="setApprovalFilter('all')"
          (keydown.enter)="setApprovalFilter('all')"
          (keydown.space)="$event.preventDefault(); setApprovalFilter('all')">
          <div class="card-body">
            <h5 class="card-title">Total Pending</h5>
            <p class="card-text">{{ totalPendingOwners }}</p>
          </div>
        </div>
      </div>

      <div class="col-4 overlap-card">
        <div
          class="card bg-terqwaz text-white stat-card-filter"
          [class.stat-card-filter--active]="approvalFilter === 'auto'"
          role="button"
          tabindex="0"
          [attr.aria-pressed]="approvalFilter === 'auto'"
          aria-label="Filter table to auto-approval pending only"
          (click)="setApprovalFilter('auto')"
          (keydown.enter)="setApprovalFilter('auto')"
          (keydown.space)="$event.preventDefault(); setApprovalFilter('auto')">
          <div class="card-body">
            <h5 class="card-title">Auto-Approval Pending</h5>
            <p class="card-text">{{ AutoApprovalOwners }}</p>
          </div>
        </div>
      </div>

      <div class="col-4 overlap-card">
        <div
          class="card bg-yellow text-white stat-card-filter"
          [class.stat-card-filter--active]="approvalFilter === 'manual'"
          role="button"
          tabindex="0"
          [attr.aria-pressed]="approvalFilter === 'manual'"
          aria-label="Filter table to manual approval only"
          (click)="setApprovalFilter('manual')"
          (keydown.enter)="setApprovalFilter('manual')"
          (keydown.space)="$event.preventDefault(); setApprovalFilter('manual')">
          <div class="card-body">
            <h5 class="card-title">Manual Approval Needed</h5>
            <p class="card-text">{{ ManualApprovalOwners }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="px-3 mb-3">
    <label class="visually-hidden" for="pending-bo-search">Search pending owners</label>
    <input
      id="pending-bo-search"
      type="search"
      class="form-control"
      placeholder="Search by owner, business, email, phone, or category…"
      [(ngModel)]="searchQuery"
      autocomplete="off"
    />
  </div>

  @if (isLoadingPending) {
    <p class="pending-loading text-center text-muted py-3" aria-live="polite">Loading pending owners…</p>
  }

  <app-table
    [columns]="['ownerName', 'businessName', 'email', 'phoneNumber', 'businessCategory', 'submittedAt']"
    [data]="filteredOwners"
    [columnStyles]="tableColumnStyles"
    [columnTypes]="tableColumnTypes"
    [badgeColors]="tableBadgeColors"
    [sortable]="true"
    [hasActions]="true"
    [actions]="['view', 'approve', 'reject']"
    (actionClick)="handleEvent($event)"
    (openDetails)="handleEvent($event)">
  </app-table>

  <app-pagination
    [hasNext]="hasNext"
    [hasPrevious]="hasPrevious"
    [pageIndex]="pageIndex"
    [totalPages]="totalPages"
    (pageChange)="pageChangeEvent($event)">
  </app-pagination>

  @if (selectedBusinessOwner) {
    <app-bo-details
      [businessOwner]="selectedBusinessOwner"
      [isOpen]="isDetailsOpen"
      [isApproveRequestPending]="isApproveRequestPending"
      (close)="closeModal()"
      (approve)="onApprove($event, '')"
      (reject)="openRejectModalFromDetails($event)">
    </app-bo-details>
  }

  <app-approve-owner
    [isOpen]="isApproveOpen"
    [businessOwner]="selectedBusinessOwner"
    [isApproveRequestPending]="isApproveRequestPending"
    (close)="closeModal()"
    (approve)="onApproveFromModal($event)">
  </app-approve-owner>

  <app-reject-owner
    [isOpen]="isRejectOpen"
    [businessOwner]="selectedBusinessOwner"
    [isRejectRequestPending]="isRejectRequestPending"
    (close)="closeModal()"
    (reason)="onRejectReason($event)"
    (reject)="onReject(selectedBusinessOwner)">
  </app-reject-owner>
</div>
