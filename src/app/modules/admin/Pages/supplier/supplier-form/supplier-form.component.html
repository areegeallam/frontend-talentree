<div class="modal-overlay" (click)="onClose()"></div>

<div class="modal-box large">
  <div class="modal-header">
    <h3>{{ isEditMode ? 'Edit Supplier' : 'Add New Supplier' }}</h3>
    <button class="btn-close-modal" (click)="onClose()">✕</button>
  </div>

  <div class="modal-body">
    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="form-grid">

      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.name" placeholder="Supplier name" />
      </div>

      <div class="form-group">
        <label>Contact Person <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.contactPerson" placeholder="Full name" />
      </div>

      <div class="form-group full-width">
        <label>Description <span class="required">*</span></label>
        <textarea [(ngModel)]="form.description" rows="3" placeholder="Supplier description..."></textarea>
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" [(ngModel)]="form.email" placeholder="email@example.com" />
      </div>

      <div class="form-group">
        <label>Phone <span class="required">*</span></label>
        <input type="tel" [(ngModel)]="form.phone" placeholder="010xxxxxxxx" />
      </div>

      <div class="form-group full-width">
        <label>Address <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.address" placeholder="Street address" />
      </div>

      <div class="form-group">
        <label>City <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.city" placeholder="Cairo" />
      </div>

      <div class="form-group">
        <label>Country <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.country" placeholder="Egypt" />
      </div>

      <div class="form-group">
        <label>Tax ID</label>
        <input type="text" [(ngModel)]="form.taxId" placeholder="Optional" />
      </div>

      <div class="form-group" *ngIf="isEditMode">
        <label>Status</label>
        <select [(ngModel)]="form.isActive">
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel" (click)="onClose()">Cancel</button>
    <button
      class="btn-confirm"
      (click)="submit()"
      [disabled]="loading || !form.name || !form.email || !form.phone || !form.city || !form.country || !form.contactPerson"
    >
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
    </button>
  </div>
</div>
