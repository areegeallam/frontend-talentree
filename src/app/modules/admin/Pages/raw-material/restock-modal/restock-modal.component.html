<div class="modal-overlay" (click)="onClose()"></div>

<div class="modal-box" *ngIf="material">
  <div class="modal-header">
    <h3>Restock Material</h3>
    <button class="btn-close-modal" (click)="onClose()">✕</button>
  </div>

  <div class="modal-body">
    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="material-info">
      <span class="material-name">{{ material.name }}</span>
      <span class="current-stock">Current stock: <strong>{{ material.stockQuantity }} {{ material.unit }}</strong></span>
    </div>

    <div class="form-group">
      <label>Quantity to Add <span class="required">*</span></label>
      <input type="number" [(ngModel)]="quantityToAdd" min="1" />
    </div>

    <div class="new-total">
      New total: <strong>{{ material.stockQuantity + quantityToAdd }} {{ material.unit }}</strong>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel" (click)="onClose()">Cancel</button>
    <button class="btn-confirm" (click)="submit()" [disabled]="loading || quantityToAdd < 1">
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Restocking...' : 'Confirm Restock' }}
    </button>
  </div>
</div>
